er you throw at me."}, {"c": "CATHERINE", "l": "But I – Fine. One store."}, {"c": "COSETTE", "l": "That's great. I feel great about this. This is going to all work out great."}, {"c": "CATHERINE", "l": "That word you said. That punch word?"}, {"c": "COSETTE", "l": "Pulchritude."}, {"c": "CATHERINE", "l": "You think I'm pretty?"}]}, {"id": "april-ryan-leo", "title": "April, Ryan & Leo", "author": "Benjamin Connor", "cast": "3-Person", "genre": "Comedy", "setting": "Bus Stop", "desc": "Leo and Ryan discuss philosophy and Ryan's secret crush — then she shows up.", "characters": ["LEO", "RYAN", "APRIL"], "emoji": {"LEO": "📖", "RYAN": "😳", "APRIL": "🥕"}, "lines": [{"c": "LEO", "l": "OK, Descartes concluded that he knew, absolutely, that he existed...and that's all."}, {"c": "RYAN", "l": "Do you think they have gluten-free food at the carnival?"}, {"c": "LEO", "l": "What?"}, {"c": "RYAN", "l": "The carnival. This weekend. Do you think they have gluten-free food?"}, {"c": "LEO", "l": "You're not allergic to gluten!"}, {"c": "RYAN", "l": "Well, no."}, {"c": "LEO", "l": "Oh my Lord, you have a date."}, {"c": "RYAN", "l": "No. No, that's not—I don't."}, {"c": "LEO", "l": "Oh, I could cry! Look at you! They grow up so fast."}, {"c": "RYAN", "l": "I don't have a date."}, {"c": "LEO", "l": "So who is it?"}, {"c": "RYAN", "l": "Forget I asked."}, {"c": "LEO", "l": "Hmmm...nope, not gonna do that."}, {"c": "RYAN", "l": "Leo."}, {"c": "LEO", "l": "Oh, throw me a bone here!"}, {"c": "RYAN", "l": "Please, Leo."}, {"c": "LEO", "l": "Or guy! Love is blind and all."}, {"c": "RYAN", "l": "It's a girl."}, {"c": "LEO", "l": "Oh, sure, he'll rise to that bait."}, {"c": "RYAN", "l": "This conversation is over."}, {"c": "LEO", "l": "I'm gonna find out who your mysterious celiac crush is. I'm like Sherlock Holmes over here. Nothing gets by me."}, {"c": "RYAN", "l": "You are in no way like Sherlock Holmes."}, {"c": "LEO", "l": "I am too! I observe. I reflect. And then I deduce."}, {"c": "RYAN", "l": "Your fly's open."}, {"c": "LEO", "l": "Thank you. Fine, then, back to philosophy."}, {"c": "RYAN", "l": "And I was wishing you'd discuss less."}, {"c": "APRIL", "l": "Hi, boys. Who finished their history project?"}, {"c": "RYAN", "l": "I'm like halfway done. I still have to make a PowerPoint about Julius Caesar and his accomplishments."}, {"c": "APRIL", "l": "What are his accomplishments?"}, {"c": "RYAN", "l": "Maybe less than halfway done."}, {"c": "APRIL", "l": "I don't know anything about my guy, yet, either. Haven't even started."}, {"c": "LEO", "l": "Would it put a damper on this little pity party if I said I'm finished?"}, {"c": "RYAN", "l": "Yes."}, {"c": "APRIL", "l": "Ugh. Lucky."}, {"c": "LEO", "l": "I really can't see how luck has anything to do with it."}, {"c": "APRIL", "l": "You were born with a good work ethic. That's lucky."}, {"c": "LEO", "l": "John Locke would say that you aren't born with any qualities."}, {"c": "RYAN", "l": "And we're off..."}, {"c": "RYAN", "l": "Carrots?"}, {"c": "APRIL", "l": "Mom woke me up late again. Didn't have time for breakfast. So...carrots."}, {"c": "LEO", "l": "Oh, April, I think I have an oatmeal bar in here somewhere. Can't have you living like a rabbit here."}, {"c": "APRIL", "l": "Wish I could, but oatmeal has oats in it."}, {"c": "LEO", "l": "Well, yes."}, {"c": "APRIL", "l": "I'm gluten intolerant."}, {"c": "LEO", "l": "Really? Well, I'll be. I never knew that."}, {"c": "APRIL", "l": "I kinda avoid mentioning it. But I thought you knew, actually."}, {"c": "LEO", "l": "This is interesting! You learn new things every day! Right, Ryan?"}, {"c": "RYAN", "l": "As long as you're alive you do."}, {"c": "APRIL", "l": "You boys alright?"}, {"c": "LEO", "l": "Yep!"}, {"c": "RYAN", "l": "Yep!"}]}];</script>

  let idx=SCRIPTS.indexOf(script);

function applyTheme(themeId){
  const t=THEMES.find(x=>x.id===themeId)||THEMES[0];
  const r=document.documentElement;
  Object.entries(t.vars).forEach(([k,v])=>r.style.setProperty("--"+k,v));
  r.style.setProperty("--accent",t.accent);
  // Compute accent opacity variants from hex
  const hex=t.accent.replace("#","");
  const R=parseInt(hex.substring(0,2),16),G=parseInt(hex.substring(2,4),16),B=parseInt(hex.substring(4,6),16);
  const a=(o)=>`rgba(${R},${G},${B},${o})`;
  r.style.setProperty("--accent-bg",a(0.08));
  r.style.setProperty("--accent-bg2",a(0.12));
  r.style.setProperty("--accent-bg3",a(0.15));
  r.style.setProperty("--accent-border",a(0.25));
  r.style.setProperty("--accent-border2",a(0.3));
  r.style.setProperty("--accent-dim",a(0.45));
  r.style.setProperty("--accent-med",a(0.6));
  r.style.setProperty("--accent-bright",a(0.7));
  r.style.setProperty("--accent-glow",a(0.07));
  document.body.style.background=t.body;
  document.body.style.color=t.vars.t1;
  document.body.className=t.type;
}

function Confetti({accent}){
  const colors=[accent,"#A3BE8C","#88C0D0","#B48EAD","#EBCB8B","#E07A9A"];
  const ps=React.useMemo(()=>Array.from({length:30},(_,i)=>({id:i,x:Math.random()*100,c:colors[i%colors.length],delay:Math.random()*0.7,size:4+Math.random()*5,dur:1.4+Math.random()*0.9,rot:Math.random()*360})),[]);
  return <div style={{position:"fixed",top:0,left:0,width:"100%",height:"100%",pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
    {ps.map(p=><div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:"-16px",width:p.size,height:p.size*0.55,background:p.c,borderRadius:2,transform:`rotate(${p.rot}deg)`,animation:`confettiFall ${p.dur}s cubic-bezier(0.25,0.46,0.45,0.94) ${p.delay}s forwards`}}/>)}
  </div>;
}

function StreakBadge({userName}){
  const [streak,setStreak]=useState(0);
  useEffect(()=>{
    try{
      const h=JSON.parse(localStorage.getItem("sm_history_"+userName)||"[]");
      if(!h.length){setStreak(0);return;}
      const days=new Set(h.map(x=>{const d=new Date(x.date);return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}));
      const sorted=[...days].sort((a,b)=>new Date(b)-new Date(a));
      let s=0;
      const today=new Date();
      for(let i=0;i<sorted.length;i++){
        const check=new Date(today);check.setDate(check.getDate()-i);
        const key=check.getFullYear()+"-"+(check.getMonth()+1)+"-"+check.getDate();
        if(days.has(key))s++;else break;
      }
      setStreak(s);
    }catch(e){setStreak(0);}
  },[userName]);
  if(streak<1)return null;
  return <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 16px",background:"var(--accent-bg)",border:"1px solid var(--accent-border)",borderRadius:30,fontSize:13,fontWeight:700,color:"var(--accent)",animation:"fadeIn 0.5s ease"}}>🔥 {streak} day streak</div>;
}

function ScriptCreator({onClose,onSave}){
  const [title,setTitle]=useState("");
  const [author,setAuthor]=useState("");
  const [genre,setGenre]=useState("");
  const [text,setText]=useState("");
  const [preview,setPreview]=useState(null);
  const [error,setError]=useState("");
  const [parsing,setParsing]=useState(false);
  const [parseStage,setParseStage]=useState("");

  const aiParse=async(raw,ttl,auth)=>{
    const prompt=`You are a script parser. Parse the following script into structured JSON.

Return ONLY a valid JSON object with NO markdown, no explanation, no backticks — just raw JSON.

The JSON must have:
- "title": string (use "${ttl}" if provided, otherwise infer from script)
- "author": string (use "${auth}" if provided, otherwise infer or use "Unknown")
- "genre": string (infer from tone: Comedy, Drama, Dramedy, etc.)
- "setting": string (infer from context, e.g. "School Hallway" or "Living Room")
- "desc": string (1-2 sentence description of the scene)
- "characters": array of character name strings (UPPERCASE, no stage directions)
- "lines": array of {c: "CHARACTER_NAME", l: "dialogue text"} objects

Rules:
- Skip stage directions entirely (lines in parentheses or italics)
- Skip scene headings, page numbers, copyright notices
- Each line object is one speech by one character
- If two characters speak simultaneously, use "BOTH" as the character name
- Character names must be UPPERCASE and consistent throughout
- Dialogue should be clean — no leading/trailing whitespace

Script to parse:
${raw}`;

    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:4000,
        messages:[{role:"user",content:prompt}]
      })
    });
    const data=await resp.json();
    const rawText=data.content.map(b=>b.text||"").join("");
    // Strip any accidental markdown fences
    const cleaned=rawText.replace(/```json|```/g,"").trim();
    return JSON.parse(cleaned);
  };

  const handlePreview=async()=>{
    setError("");
    if(!title.trim()){setError("Add a title first");return;}
    if(!text.trim()){setError("Paste your script");return;}
    setParsing(true);
    setParseStage("Reading your script…");
    try{
      setParseStage("AI is parsing characters and lines…");
      const result=await aiParse(text,title,author);
      setParseStage("Finishing up…");
      if(!result.lines||result.lines.length<2){setError("AI couldn't find enough dialogue. Check your script format.");setParsing(false);return;}
      setPreview(result);
    }catch(e){
      // Fallback to regex parser if AI fails
      setParseStage("AI unavailable — using basic parser…");
      await new Promise(r=>setTimeout(r,600));
      const lines=text.split("\n").filter(l=>l.trim());
      const cards=[];const chars=new Set();
      for(const line of lines){
        const m=line.match(/^([A-Z][A-Za-z\s.''\-]+?):\s*(.+)/);
        if(m){const c=m[1].trim(),l=m[2].trim();chars.add(c);cards.push({c,l});}
        else if(cards.length>0){cards[cards.length-1].l+=" "+line.trim();}
      }
      if(cards.length<2){setError("Couldn't find dialogue. Format each line as CHARACTER: dialogue");setParsing(false);return;}
      setPreview({title:title.trim(),author:author.trim()||"Custom",genre:genre||"Custom",setting:"",desc:"Custom script — "+cards.length+" lines",characters:[...chars],lines:cards});
    }
    setParsing(false);setParseStage("");
  };

  const handleSave=()=>{
    if(!preview)return;
    const id="custom-"+Date.now();
    const s={
      id,
      title:preview.title||title.trim(),
      author:preview.author||author.trim()||"Custom",
      cast:preview.characters.length+"-Person",
      genre:preview.genre||genre||"Custom",
      setting:preview.setting||"",
      desc:preview.desc||"Custom script — "+preview.lines.length+" lines",
      characters:preview.characters,
      emoji:{},
      lines:preview.lines
    };
    onSave(s);
  };

  const accent="var(--accent)";
  return(
    <div style={{position:"fixed",inset:0,background:"var(--modal)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1500,padding:20,backdropFilter:"blur(6px)"}} onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{width:"100%",maxWidth:560,maxHeight:"85vh",background:"var(--card)",border:"1px solid var(--accent-border)",borderRadius:24,display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,0.8)",animation:"fadeUp 0.3s ease"}}>
        <div style={{padding:"24px 28px 16px",borderBottom:"1px solid var(--brd)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:3,textTransform:"uppercase",color:"var(--accent-med)",marginBottom:4}}>Add Script</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700}}>AI Script Parser</div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"1px solid var(--brd3)",borderRadius:20,color:"var(--t3)",fontSize:13,cursor:"pointer",padding:"6px 14px"}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1,padding:"20px 28px 28px"}}>
          {parsing?(
            <div style={{textAlign:"center",padding:"48px 0"}}>
              <div style={{fontSize:40,marginBottom:16,animation:"spin 1.2s linear infinite",display:"inline-block"}}>✦</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:8}}>Parsing Script</div>
              <div style={{fontSize:14,color:"var(--t4)",animation:"fadeIn 0.4s ease"}}>{parseStage}</div>
            </div>
          ):!preview?(
            <>
              <div style={{display:"flex",gap:10,marginBottom:10}}>
                <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Script title *" style={{flex:1,padding:"12px 16px",background:"var(--bg3)",border:"1px solid var(--brd3)",borderRadius:12,color:"var(--t1)",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
                <input value={author} onChange={e=>setAuthor(e.target.value)} placeholder="Author (optional)" style={{flex:1,padding:"12px 16px",background:"var(--bg3)",border:"1px solid var(--brd3)",borderRadius:12,color:"var(--t1)",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{fontSize:13,color:"var(--t4)",marginBottom:8,lineHeight:1.6}}>
                ✦ AI will automatically detect characters, clean up stage directions, and fill in genre and setting. Just paste any script format below.
              </div>
              <textarea value={text} onChange={e=>setText(e.target.value)} placeholder={"Paste any script format — standard, PDF copy-paste, whatever you have:\n\nROMEO: But soft, what light through yonder window breaks?\n\nJULIET\nO Romeo, Romeo! Wherefore art thou Romeo?\n\n(Stage direction in parens will be ignored)"} rows={13} style={{width:"100%",padding:"14px 16px",background:"var(--bg2)",border:"1px solid var(--brd2)",borderRadius:14,color:"var(--t1)",fontSize:13,fontFamily:"inherit",resize:"vertical",outline:"none",lineHeight:1.7,boxSizing:"border-box"}}/>
              {error&&<div style={{marginTop:10,fontSize:13,color:"#BF616A"}}>{error}</div>}
              <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
                <button onClick={handlePreview} className="btn-press" style={{padding:"12px 32px",background:`linear-gradient(135deg,${accent},${accent}cc)`,border:"none",borderRadius:40,color:"#1a1a1a",fontSize:14,fontWeight:700,cursor:"pointer"}}>✦ Parse with AI</button>
              </div>
            </>
          ):(
            <>
              <div style={{background:"rgba(163,190,140,0.08)",border:"1px solid rgba(163,190,140,0.2)",borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:13,color:"#A3BE8C"}}>
                ✓ AI found <strong>{preview.lines.length}</strong> lines across <strong>{preview.characters.length}</strong> characters
                {preview.genre&&preview.genre!=="Custom"&&<> · <span style={{color:"var(--t3)"}}>{preview.genre}</span></>}
                {preview.setting&&<> · <span style={{color:"var(--t3)"}}>{preview.setting}</span></>}
              </div>
              {preview.desc&&<div style={{fontSize:13,color:"var(--t3)",fontStyle:"italic",marginBottom:14,lineHeight:1.6}}>{preview.desc}</div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                {preview.characters.map(c=><span key={c} style={{padding:"4px 14px",borderRadius:20,background:"var(--accent-bg2)",color:"var(--accent)",fontSize:13,fontWeight:600}}>{c} · {preview.lines.filter(x=>x.c===c).length}</span>)}
              </div>
              <div style={{maxHeight:200,overflowY:"auto",background:"var(--bg2)",borderRadius:12,padding:14,marginBottom:16}}>
                {preview.lines.slice(0,10).map((c,i)=><div key={i} style={{fontSize:13,color:"var(--t2)",marginBottom:6,lineHeight:1.5}}><span style={{color:"var(--accent)",fontWeight:600}}>{c.c}:</span> {c.l}</div>)}
                {preview.lines.length>10&&<div style={{fontSize:12,color:"var(--t6)",marginTop:8}}>…and {preview.lines.length-10} more lines</div>}
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button onClick={()=>setPreview(null)} className="btn-press" style={{padding:"11px 24px",background:"var(--bg3)",border:"1px solid var(--brd2)",borderRadius:40,color:"var(--t2)",fontSize:14,cursor:"pointer"}}>← Re-parse</button>
                <button onClick={handleSave} className="btn-press" style={{padding:"11px 32px",background:`linear-gradient(135deg,${accent},${accent}cc)`,border:"none",borderRadius:40,color:"#1a1a1a",fontSize:14,fontWeight:700,cursor:"pointer"}}>Add Script ✓</button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function Memorizer({script,onBack,userName,onSessionComplete}){
  const [step,setStep]=useState(0);
  const [myRole,setMyRole]=useState(null);
  const [ci,setCi]=useState(0);
  const [rev,setRev]=useState(false);
  const [mode,setMode]=useState("sequential");
  const [cards,setCards]=useState([...script.lines]);
  const [score,setScore]=useState(0);
  const [tot,setTot]=useState(0);
  const [shuffleKey,setShuffleKey]=useState(0);
  const [stepAnim,setStepAnim]=useState(true);
  const [shaking,setShaking]=useState(false);
  const [hint,setHint]=useState(false);
  const savedRef=React.useRef(false);

  useEffect(()=>{if(step===3&&!savedRef.current&&tot>0&&onSessionComplete){savedRef.current=true;const pct=Math.round((score/tot)*100);onSessionComplete({scriptId:script.id,scriptTitle:script.title,role:myRole,score,total:tot,pct,mode,date:new Date().toISOString()});}},[step]);
  useEffect(()=>{if(step!==3)savedRef.current=false;},[step]);

  const roles=script.characters.filter(c=>c!=="BOTH"&&c!=="GIRLS");
  const accent=myRole?gc(script,myRole):"var(--accent)";

  function freshShuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  const switchMode=(m)=>{setMode(m);setShuffleKey(k=>k+1);};
  const changeStep=(n)=>{setStepAnim(false);setTimeout(()=>{setStep(n);requestAnimationFrame(()=>setStepAnim(true));},190);};

  useEffect(()=>{
    let c=[...script.lines];
    if(mode==="mylines")c=c.filter(x=>x.c===myRole||x.c==="BOTH"||x.c==="GIRLS");
    if(mode==="random")c=freshShuffle(c.filter(x=>x.c===myRole||x.c==="BOTH"||x.c==="GIRLS"));
    setCards(c);setCi(0);setRev(false);setHint(false);setScore(0);setTot(0);
  },[mode,myRole,shuffleKey]);

  const cur=cards[ci];
  const isMine=cur&&(cur.c===myRole||cur.c==="BOTH"||cur.c==="GIRLS");
  const cc=cur?gc(script,cur.c):"#fff";
  const doNext=()=>{setCi(i=>Math.min(i+1,cards.length-1));setRev(false);setHint(false)};
  const scoreN=(g)=>{if(g)setScore(s=>s+1);else{setShaking(true);setTimeout(()=>setShaking(false),520);}setTot(t=>t+1);ci<cards.length-1?doNext():changeStep(3)};
  const restart=()=>{changeStep(2);if(mode==="random"){setShuffleKey(k=>k+1);}else{setCi(0);setRev(false);setScore(0);setTot(0);}};

  const Btn=({onClick,disabled,label,primary})=>(
    <button onClick={onClick} disabled={disabled} className={disabled?"":"btn-press"} style={{padding:"10px 26px",background:primary?accent+"22":"var(--bg2)",border:primary?`1px solid ${accent}55`:"1px solid var(--brd)",borderRadius:40,color:disabled?"var(--brd4)":primary?accent:"var(--t1)",fontSize:14,fontWeight:600,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1}}>{label}</button>
  );

  return(
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <button onClick={onBack} className="btn-press" style={{padding:"10px 16px",background:"transparent",border:"1px solid var(--brd2)",borderRadius:20,color:"var(--t4)",fontSize:12,cursor:"pointer",marginBottom:20}}>← All Scripts</button>
      <div style={{textAlign:"center",marginBottom:24}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,margin:"0 0 4px",textWrap:"balance"}}>{script.title}</h2>
        <div style={{fontSize:13,color:"var(--t5)"}}>by {script.author} · {script.cast}</div>
      </div>
      <div style={{transition:"opacity 0.2s cubic-bezier(0.2,0,0,1),transform 0.2s cubic-bezier(0.2,0,0,1)",opacity:stepAnim?1:0,transform:stepAnim?"none":"translateY(8px)"}}>
      {step===0&&(
        <div style={{textAlign:"center"}}>
          <div style={{background:"var(--bg2)",border:"2px solid var(--brd)",borderRadius:20,padding:"32px 24px",marginBottom:24}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,lineHeight:1.7,marginBottom:16}}>{script.desc}</div>
            <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap",fontSize:13,color:"var(--t4)"}}>
              {roles.map(r=><span key={r}>{(script.emoji||{})[r]||"🎭"} <span style={{color:gc(script,r),fontWeight:600}}>{r}</span> · {script.lines.filter(x=>x.c===r).length} lines</span>)}
            </div>
          </div>
          <button onClick={()=>changeStep(1)} className="btn-press" style={{padding:"14px 48px",background:`linear-gradient(135deg,${accent},${accent}cc)`,border:"none",borderRadius:40,color:"#1a1a1a",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:1,textTransform:"uppercase"}}>Get Started</button>
        </div>
      )}

      {step===1&&(
        <div>
          <p style={{textAlign:"center",fontSize:15,color:"var(--t3)",marginBottom:24}}>Pick your role — your lines will be hidden during practice</p>
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            {roles.map((name,ri)=>{
              const a=myRole===name,col=gc(script,name);
              return <button key={name} onClick={()=>setMyRole(name)} className="btn-press" style={{flex:1,minWidth:130,padding:"24px 16px",background:a?`linear-gradient(135deg,${col},${col}bb)`:"var(--bg2)",border:a?`2px solid ${col}`:"2px solid var(--brd2)",borderRadius:16,cursor:"pointer",transition:"background 0.3s cubic-bezier(0.2,0,0,1),border-color 0.3s cubic-bezier(0.2,0,0,1),transform 0.3s cubic-bezier(0.2,0,0,1)",transform:a?"scale(1.03)":"scale(1)",animation:`cardIn 0.4s cubic-bezier(0.2,0,0,1) ${ri*80}ms both`}}>
                <div style={{fontSize:28,marginBottom:6}}>{(script.emoji||{})[name]||"🎭"}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:a?"#1a1a1a":"var(--t1)"}}>{name}</div>
                <div style={{fontSize:12,color:a?"rgba(0,0,0,0.5)":"var(--t5)"}}>{script.lines.filter(x=>x.c===name).length} lines</div>
              </button>;
            })}
          </div>
          <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:28}}>
            <button onClick={()=>changeStep(0)} className="btn-press" style={{padding:"10px 24px",background:"transparent",border:"1px solid var(--brd2)",borderRadius:40,color:"var(--t3)",fontSize:13,cursor:"pointer"}}>← Back</button>
            {myRole&&<button onClick={()=>{changeStep(2);switchMode("sequential")}} className="btn-press" style={{padding:"14px 40px",background:`linear-gradient(135deg,${accent},${accent}cc)`,border:"none",borderRadius:40,color:"#1a1a1a",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:1,textTransform:"uppercase"}}>Start as {myRole}</button>}
          </div>
        </div>
      )}

      {step===2&&cards.length>0&&cur&&(
        <div>
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:18}}>
            {[{id:"sequential",l:"In Order"},{id:"random",l:"Shuffle"},{id:"mylines",l:"My Lines"}].map(m=>
              <button key={m.id} onClick={()=>switchMode(m.id)} className="btn-press" style={{padding:"10px 16px",background:mode===m.id?accent+"22":"var(--bg2)",border:mode===m.id?`1px solid ${accent}55`:"1px solid var(--brd)",borderRadius:20,color:mode===m.id?accent:"var(--t5)",fontSize:12,fontWeight:600,cursor:"pointer"}}>{m.l}</button>
            )}
          </div>
          <div style={{width:"100%",height:3,background:"var(--brd)",borderRadius:2,marginBottom:22,overflow:"hidden"}}>
            <div style={{width:`${((ci+1)/cards.length)*100}%`,height:"100%",background:`linear-gradient(90deg,${accent},${accent}cc)`,borderRadius:2,transition:"width 0.4s cubic-bezier(0.2,0,0,1)"}}/>
          </div>
          {(()=>{
            const origIdx=script.lines.indexOf(cur);
            const cue=(mode!=="sequential"&&isMine&&origIdx>0)?script.lines[origIdx-1]:null;
            const cueColor=cue?gc(script,cue.c):"#fff";
            return <>
            {cue&&(
              <div style={{background:"var(--bg2)",border:"1px solid var(--brd)",borderRadius:12,padding:"14px 20px",marginBottom:12,textAlign:"center"}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:cueColor,marginBottom:8,opacity:0.7}}>↑ CUE — {cue.c}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,lineHeight:1.6,color:cueColor,opacity:0.85}}>&ldquo;{cue.l}&rdquo;</div>
              </div>
            )}
            <div style={{background:"var(--bg2)",boxShadow:isMine?`0 0 0 1.5px ${cc}55,0 0 40px ${cc}12,0 4px 24px rgba(0,0,0,0.4)`:"0 0 0 1px var(--brd),0 2px 12px rgba(0,0,0,0.3)",borderRadius:20,padding:"42px 28px",minHeight:180,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",position:"relative",transition:"box-shadow 0.3s cubic-bezier(0.2,0,0,1)",animation:shaking?"shake 0.52s ease":""}}>
              <div style={{position:"absolute",top:16,right:20,fontSize:13,color:"var(--t7)",fontVariantNumeric:"tabular-nums"}}>{ci+1}/{cards.length}</div>
              <div style={{position:"absolute",top:16,left:20,fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:isMine?cc:"var(--t4)",background:(isMine?cc:"var(--t4)")+"15",padding:"4px 14px",borderRadius:8}}>
                {isMine?(cur.c==="BOTH"?"★ BOTH":"★ YOUR LINE"):cur.c}
              </div>
              {isMine&&!rev?(
                <div style={{textAlign:"center"}}>
                  {hint?(
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,color:cc+"90",marginBottom:22,animation:"fadeIn 0.3s ease"}}>&ldquo;{cur.l.split(/\s+/).slice(0,4).join(" ")}…&rdquo;</div>
                  ):(
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontStyle:"italic",color:cc+"80",marginBottom:22}}>What's your line?</div>
                  )}
                  <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                    {!hint&&<button onClick={()=>setHint(true)} className="btn-press" style={{padding:"12px 24px",background:"var(--bg3)",border:"1px solid var(--brd4)",borderRadius:40,color:"var(--t2)",fontSize:13,fontWeight:600,cursor:"pointer"}}>💡 Hint</button>}
                    <button onClick={()=>{setTimeout(()=>setRev(true),80)}} className="btn-press" style={{padding:"12px 34px",background:`linear-gradient(135deg,${cc},${cc}cc)`,border:"none",borderRadius:40,color:"#1a1a1a",fontSize:14,fontWeight:700,cursor:"pointer",letterSpacing:1,textTransform:"uppercase"}}>Reveal</button>
                  </div>
                </div>
              ):(
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,lineHeight:1.75,color:isMine?cc:"var(--t1)",textAlign:"center",maxWidth:520,animation:isMine&&rev?"revealLine 0.5s cubic-bezier(0.2,0,0,1)":"fadeIn 0.3s ease"}}>&ldquo;{cur.l}&rdquo;</div>
              )}
            </div>
            </>;
          })()}
          <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:22}}>
            <Btn onClick={()=>{setCi(i=>Math.max(i-1,0));setRev(false);setHint(false)}} disabled={ci===0} label="← Prev"/>
            {isMine&&!rev
              ? <>{!hint&&<Btn onClick={()=>setHint(true)} label="💡 Hint"/>}<Btn onClick={()=>{setTimeout(()=>setRev(true),80)}} primary label="Reveal"/></>
              : ci<cards.length-1
                ? <Btn onClick={doNext} primary label="Next →"/>
                : <Btn onClick={restart} primary label="↺ Restart"/>
            }
          </div>
          {isMine&&rev&&(
            <div style={{display:"flex",justifyContent:"center",gap:10,marginTop:14,animation:"fadeIn 0.3s ease"}}>
              <button onClick={()=>scoreN(true)} className="btn-press btn-pulse-green" style={{padding:"10px 22px",background:"rgba(163,190,140,0.12)",border:"1px solid rgba(163,190,140,0.3)",borderRadius:20,color:"#A3BE8C",fontSize:13,fontWeight:600,cursor:"pointer"}}>✓ Got It</button>
              <button onClick={()=>scoreN(false)} className="btn-press btn-pulse-red" style={{padding:"10px 22px",background:"rgba(191,97,106,0.12)",border:"1px solid rgba(191,97,106,0.3)",borderRadius:20,color:"#BF616A",fontSize:13,fontWeight:600,cursor:"pointer"}}>✗ Missed</button>
            </div>
          )}
          <div style={{textAlign:"center",marginTop:24}}>
            <button onClick={()=>{changeStep(1);setMyRole(null);setCi(0);switchMode("sequential")}} className="btn-press" style={{padding:"10px 18px",background:"transparent",border:"1px solid var(--bg4)",borderRadius:20,color:"var(--t7)",fontSize:12,cursor:"pointer"}}>Switch Role</button>
          </div>
        </div>
      )}

      {step===3&&(()=>{
        const pct=tot>0?Math.round((score/tot)*100):0;
        return <>{pct>=80&&<Confetti accent={accent}/>}<div style={{textAlign:"center",background:"var(--bg2)",border:"2px solid var(--brd)",borderRadius:20,padding:"44px 32px"}}>
          <div style={{fontSize:52,marginBottom:14}}>{pct>=80?"🌟":pct>=50?"👏":"💪"}</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,marginBottom:8,textWrap:"balance"}}>{pct>=80?"Brilliant!":pct>=50?"Almost There!":"Keep Practicing!"}</div>
          <div style={{fontSize:15,color:"var(--t3)",marginBottom:28,fontVariantNumeric:"tabular-nums"}}>{score} of {tot} lines ({pct}%)</div>
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={restart} className="btn-press" style={{padding:"12px 34px",background:`linear-gradient(135deg,${accent},${accent}cc)`,border:"none",borderRadius:40,color:"#1a1a1a",fontSize:14,fontWeight:700,cursor:"pointer",textTransform:"uppercase"}}>Again</button>
            <button onClick={()=>{changeStep(1);setMyRole(null)}} className="btn-press" style={{padding:"12px 24px",background:"var(--bg3)",border:"1px solid var(--brd2)",borderRadius:40,color:"var(--t2)",fontSize:14,cursor:"pointer"}}>Switch Role</button>
          </div>
        </div></>;      })()}
      </div>
    </div>
  );
}

function ReportModal({userName,onClose}){
  const [tab,setTab]=useState("bug");
  const [msg,setMsg]=useState("");
  const [script,setScript]=useState("");
  const [sent,setSent]=useState(false);
  const [sending,setSending]=useState(false);
  const [err,setErr]=useState("");

  const submit=async()=>{
    const text=tab==="bug"?msg.trim():script.trim();
    if(!text){setErr("Please fill in the field before sending.");return;}
    setSending(true);setErr("");
    try{
      const storageOk=typeof window!="undefined"&&window.storage&&typeof window.storage.set==="function";
      if(storageOk){
        const key="reports:"+Date.now()+":"+Math.random().toString(36).slice(2);
        const val=JSON.stringify({type:tab,user:userName||"anonymous",text,ts:new Date().toISOString()});
        await window.storage.set(key,val,true);
      }else{
        try{const r=JSON.parse(localStorage.getItem("sm_reports")||"[]");r.push({type:tab,user:userName||"anonymous",text,ts:new Date().toISOString()});localStorage.setItem("sm_reports",JSON.stringify(r.slice(-50)));}catch(e2){}
      }
      setSent(true);
    }catch(e){
      setErr("Couldn't send — please try again.");
    }
    setSending(false);
  };

  const accent="var(--accent)";
  const tabStyle=(active)=>({
    flex:1,padding:"8px 0",background:active?accent+"22":"transparent",
    border:"none",borderBottom:active?`2px solid ${accent}`:"2px solid var(--brd)",
    color:active?accent:"var(--t4)",fontSize:13,fontWeight:700,
    letterSpacing:1,textTransform:"uppercase",cursor:"pointer",transition:"all 0.2s"

  return(
    <div style={{position:"fixed",inset:0,background:"var(--modal)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20,backdropFilter:"blur(4px)"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose()}}>

        {sent?(
          <div style={{textAlign:"center",padding:"16px 0"}}>
            <div style={{fontSize:44,marginBottom:12}}>🎭</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,marginBottom:8}}>Sent — thank you!</div>
            <div style={{fontSize:14,color:"var(--t3)",marginBottom:24}}>Your {tab==="bug"?"report":"request"} has been received.</div>
            <button onClick={onClose} style={{padding:"10px 32px",background:accent+"22",border:`1px solid ${accent}55`,borderRadius:40,color:accent,fontSize:14,fontWeight:600,cursor:"pointer"}}>Close</button>
          </div>
        ):(
          <>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700}}>Community</div>
              <button onClick={onClose} style={{background:"transparent",border:"none",color:"var(--t5)",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
            </div>
            <div style={{display:"flex",marginBottom:24,borderBottom:"2px solid var(--brd)"}}>
              <button style={tabStyle(tab==="bug")} onClick={()=>{setTab("bug");setMsg("");setErr("");}}>🐛 Bug Report</button>
              <button style={tabStyle(tab==="request")} onClick={()=>{setTab("request");setScript("");setErr("");}}>📜 Script Request</button>
            </div>
            {tab==="bug"?(
              <>
                <div style={{fontSize:13,color:"var(--t3)",marginBottom:12,lineHeight:1.6}}>Something broken or behaving oddly? Tell us what happened.</div>
                <textarea
                  value={msg}
                  onChange={e=>setMsg(e.target.value)}
                  placeholder="Describe the bug — what you did, what you expected, what happened instead…"
                  rows={5}
                  style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--brd3)",borderRadius:12,padding:"12px 14px",color:"var(--t1)",fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",lineHeight:1.6,boxSizing:"border-box"}}
                />
              </>
            ):(
              <>
                <div style={{fontSize:13,color:"var(--t3)",marginBottom:12,lineHeight:1.6}}>Want a script added? Tell us the title, playwright, and where to find it.</div>
                <textarea
                  value={script}
                  onChange={e=>setScript(e.target.value)}
                  placeholder='e.g. Waiting for Godot by Beckett — Act 1, Vladimir and Estragon. Include title, playwright, and a link if possible.'
                  rows={5}
                  style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--brd3)",borderRadius:12,padding:"12px 14px",color:"var(--t1)",fontSize:14,fontFamily:"inherit",resize:"vertical",outline:"none",lineHeight:1.6,boxSizing:"border-box"}}
                />

            <div style={{display:"flex",justifyContent:"flex-end",marginTop:18}}>
              <button onClick={submit} disabled={sending} style={{padding:"11px 32px",background:sending?"var(--bg4)":`linear-gradient(135deg,${accent},${accent}cc)`,border:"none",borderRadius:40,color:sending?"var(--t5)":"#1a1a1a",fontSize:14,fontWeight:700,cursor:sending?"not-allowed":"pointer",letterSpacing:0.5}}>

            </div>
          </>
        )}
      </div>
    </div>
  );
}

function AdminPanel({onClose}){
  const [reports,setReports]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState("all");
  const [deleted,setDeleted]=useState(new Set());

  useEffect(()=>{
    const load=async()=>{
      setLoading(true);
      let found=[];
      try{
        const storageOk=typeof window!="undefined"&&window.storage&&typeof window.storage.list==="function";
        if(storageOk){
          const res=await window.storage.list("reports:",true);
          const keys=(res&&res.keys)||[];
          const items=await Promise.all(keys.map(async k=>{
            try{const r=await window.storage.get(k,true);return r?{key:k,...JSON.parse(r.value)}:null;}catch(e){return null;}
          }));
          found=items.filter(Boolean);
        } else {
          const local=JSON.parse(localStorage.getItem("sm_reports")||"[]");
          found=local.map((r,i)=>({key:"local:"+i,...r}));
        }
        found.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
        setReports(found);
      }catch(e){console.error(e);}
      setLoading(false);
    };
    load();
  },[]);

  const deleteReport=async(key)=>{
    try{
      const storageOk=typeof window!="undefined"&&window.storage&&typeof window.storage.delete==="function";
      if(storageOk) await window.storage.delete(key,true);
      setDeleted(d=>new Set([...d,key]));
    }catch(e){}
  };

  const accent="var(--accent)";
  const visible=reports.filter(r=>!deleted.has(r.key)&&(filter==="all"||r.type===filter));
  const bugs=reports.filter(r=>!deleted.has(r.key)&&r.type==="bug").length;
  const reqs=reports.filter(r=>!deleted.has(r.key)&&r.type==="request").length;

  const fmt=(ts)=>{try{return new Date(ts).toLocaleString();}catch(e){return ts;}};

  return(
    <div style={{position:"fixed",inset:0,background:"var(--modal)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20,backdropFilter:"blur(6px)"}}>
      <div style={{width:"100%",maxWidth:640,maxHeight:"85vh",background:"var(--card)",border:"1px solid var(--accent-border2)",borderRadius:24,display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,0.8)"}}>

        {/* Header */}
        <div style={{padding:"24px 28px 16px",borderBottom:"1px solid var(--brd)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700}}>Admin Panel</div>
              <div style={{fontSize:12,color:"var(--t5)",marginTop:2}}>Community submissions</div>
            </div>
            <button onClick={onClose} style={{background:"transparent",border:"1px solid var(--brd3)",borderRadius:20,color:"var(--t3)",fontSize:13,cursor:"pointer",padding:"6px 14px"}}>Close</button>
          </div>
          <div style={{display:"flex",gap:8}}>
            {[["all","All","#888",bugs+reqs],["bug","Bugs","#BF616A",bugs],["request","Requests","#A3BE8C",reqs]].map(([id,label,col,count])=>(
              <button key={id} onClick={()=>setFilter(id)} style={{padding:"5px 14px",borderRadius:20,border:filter===id?`1px solid ${col}55`:"1px solid var(--brd)",background:filter===id?col+"18":"transparent",color:filter===id?col:"var(--t4)",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                {label} <span style={{opacity:0.7}}>({count})</span>
              </button>
            ))}
          </div>
        </div>

        {/* Body */}
        <div style={{overflowY:"auto",flex:1,padding:"16px 28px 24px"}}>
          {loading?(
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--t5)",fontSize:14}}>Loading reports…</div>
          ):visible.length===0?(
            <div style={{textAlign:"center",padding:"40px 0",color:"var(--t6)",fontSize:14}}>No {filter==="all"?"submissions":filter+"s"} yet.</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {visible.map(r=>(
                <div key={r.key} style={{background:"var(--bg2)",border:`1px solid ${r.type==="bug"?"rgba(191,97,106,0.2)":"rgba(163,190,140,0.2)"}`,borderRadius:14,padding:"16px 18px"}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:"uppercase",padding:"3px 10px",borderRadius:20,background:r.type==="bug"?"rgba(191,97,106,0.15)":"rgba(163,190,140,0.15)",color:r.type==="bug"?"#BF616A":"#A3BE8C"}}>{r.type==="bug"?"Bug":"Request"}</span>
                      <span style={{fontSize:12,color:"var(--t3)"}}>{r.user||"anonymous"}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:11,color:"var(--t7)"}}>{fmt(r.ts)}</span>
                      <button onClick={()=>deleteReport(r.key)} title="Dismiss" style={{background:"transparent",border:"none",color:"var(--t7)",cursor:"pointer",fontSize:16,lineHeight:1,padding:"0 2px"}}>&times;</button>
                    </div>
                  </div>
                  <div style={{fontSize:14,color:"var(--t1)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{r.text}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

    try{localStorage.setItem("sm_current_user",name);}catch(e){}
    const seen=localStorage.getItem("sm_seen_version")||"";
    if(seen!==LATEST_VERSION) setShowChangelog(true);
  };
  const handleLogout=()=>{setUserName("");try{localStorage.removeItem("sm_current_user");}catch(e){}};
  const handleSessionComplete=(session)=>{try{const key="sm_history_"+userName;const h=JSON.parse(localStorage.getItem(key)||"[]");h.unshift(session);localStorage.setItem(key,JSON.stringify(h.slice(0,50)));}catch(e){}};
  const dismissChangelog=()=>{
    setShowChangelog(false);
    setSeenVersion(LATEST_VERSION);
    try{localStorage.setItem("sm_seen_version",LATEST_VERSION);}catch(e){}
  };
  const handleSaveScript=(s)=>{
    const updated=[...customScripts,s];
    setCustomScripts(updated);
    try{localStorage.setItem("sm_custom_scripts",JSON.stringify(updated));}catch(e){}
    setShowCreator(false);
  };

  const tryAdmin=()=>{
    if(adminInput==="Dayyan143:"){setAdminUnlocked(true);setAdminError(false);}
    else{setAdminError(true);setAdminInput("");}
  };

  if(!userName)return <LoginScreen onLogin={handleLogin}/>;

  return(
    <div style={{minHeight:"100vh",background:bg,color:fg,padding:"36px 20px",display:"flex",flexDirection:"column",alignItems:"center",transition:"background 0.4s ease,color 0.4s ease"}}>
      {showCreator&&<ScriptCreator onClose={()=>setShowCreator(false)} onSave={handleSaveScript}/>}
      {showThemes&&<ThemePicker current={theme} onSelect={(id)=>{selectTheme(id);setShowThemes(false)}} onClose={()=>setShowThemes(false)}/>}
      {showReport&&<ReportModal userName={userName} onClose={()=>setShowReport(false)}/>}
      {showChangelog&&(
        <div style={{position:"fixed",inset:0,background:"var(--modal)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1500,padding:20,backdropFilter:"blur(6px)"}} onClick={e=>{if(e.target===e.currentTarget)dismissChangelog();}}>
          <div style={{width:"100%",maxWidth:500,maxHeight:"80vh",background:"var(--card)",border:"1px solid var(--accent-border2)",borderRadius:24,display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 24px 80px rgba(0,0,0,0.8)",animation:"fadeUp 0.3s ease"}}>
            <div style={{padding:"24px 28px 16px",borderBottom:"1px solid var(--brd)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:3,textTransform:"uppercase",color:"var(--accent-med)",marginBottom:4}}>What's New</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700}}>Latest Updates</div>
              </div>
              <button onClick={dismissChangelog} style={{background:"transparent",border:"1px solid var(--brd3)",borderRadius:20,color:"var(--t3)",fontSize:13,cursor:"pointer",padding:"6px 14px",flexShrink:0}}>✕ Close</button>
            </div>
            <div style={{overflowY:"auto",flex:1,padding:"20px 28px 28px"}}>
              {UPDATES.map((u,ui)=>(
                <div key={u.version} style={{marginBottom:ui<UPDATES.length-1?28:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:ui===0?"var(--accent-bg3)":"var(--bg4)",color:ui===0?"var(--accent)":"var(--t5)",letterSpacing:0.5}}>v{u.version}</span>
                    <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:ui===0?"var(--t1)":"var(--t2)"}}>{u.title}</span>
                    <span style={{fontSize:11,color:"var(--t7)",marginLeft:"auto"}}>{u.date}</span>
                  </div>
                  <ul style={{listStyle:"none",padding:0,margin:0,display:"flex",flexDirection:"column",gap:7}}>
                    {u.items.map((item,ii)=>(
                      <li key={ii} style={{display:"flex",gap:10,fontSize:13,color:ui===0?"var(--t2)":"var(--t4)",lineHeight:1.5}}>
                        <span style={{color:ui===0?"var(--accent)":"var(--t7)",flexShrink:0,marginTop:1}}>◆</span>
                        {item}
                      </li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {showAdmin&&(
        adminUnlocked
          ? <AdminPanel onClose={()=>{setShowAdmin(false);setAdminUnlocked(false);setAdminInput("");}}/>
          : <div style={{position:"fixed",inset:0,background:"var(--modal)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,backdropFilter:"blur(6px)"}} onClick={e=>{if(e.target===e.currentTarget){setShowAdmin(false);setAdminInput("");setAdminError(false);}}}>
              <div style={{background:"var(--card)",border:"1px solid var(--accent-border)",borderRadius:20,padding:"36px 32px",width:"100%",maxWidth:360,textAlign:"center"}}>
                <div style={{fontSize:28,marginBottom:12}}>🔐</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,marginBottom:6}}>Admin Access</div>
                <div style={{fontSize:13,color:"var(--t4)",marginBottom:24}}>Enter your password to continue</div>
                <input
                  type="password"
                  value={adminInput}
                  onChange={e=>{setAdminInput(e.target.value);setAdminError(false);}}
                  onKeyDown={e=>e.key==="Enter"&&tryAdmin()}
                  placeholder="Password"
                  autoFocus
                  style={{width:"100%",boxSizing:"border-box",padding:"12px 16px",background:"var(--bg4)",border:adminError?"1px solid #BF616A":"1px solid var(--brd3)",borderRadius:12,color:"var(--t1)",fontSize:15,outline:"none",marginBottom:8,textAlign:"center",letterSpacing:2}}
                />
                {adminError&&<div style={{fontSize:12,color:"#BF616A",marginBottom:8}}>Incorrect password</div>}
                <button onClick={tryAdmin} style={{marginTop:8,width:"100%",padding:"12px",background:"linear-gradient(135deg,#D4A054,#D4A054cc)",border:"none",borderRadius:12,color:"#1a1a1a",fontSize:14,fontWeight:700,cursor:"pointer"}}>Unlock</button>
              </div>
            </div>
      )}
      <div style={{position:"fixed",bottom:24,right:24,zIndex:900,display:"flex",flexDirection:"column",gap:8,alignItems:"center"}}>
        <button onClick={()=>{setShowAdmin(true);setAdminUnlocked(false);setAdminInput("");setAdminError(false);}} title="Admin panel" style={{width:36,height:36,borderRadius:"50%",background:"var(--card)",border:"1px solid var(--brd)",color:"var(--t7)",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 12px rgba(0,0,0,0.4)",backdropFilter:"blur(6px)",transition:"all 0.2s"}}
          onMouseOver={e=>{e.currentTarget.style.borderColor="var(--accent-border2)";e.currentTarget.style.color="var(--accent-med)";}}
          onMouseOut={e=>{e.currentTarget.style.borderColor="var(--brd)";e.currentTarget.style.color="var(--t7)";}}
        >⚙</button>
        <button onClick={()=>setShowReport(true)} title="Report a bug or request a script" style={{width:44,height:44,borderRadius:"50%",background:"var(--card)",border:"1px solid var(--brd4)",color:"var(--t3)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.5)",backdropFilter:"blur(6px)",transition:"all 0.2s"}}
          onMouseOver={e=>{e.currentTarget.style.borderColor="var(--accent-med)";e.currentTarget.style.color="var(--accent)";}}
          onMouseOut={e=>{e.currentTarget.style.borderColor="var(--brd4)";e.currentTarget.style.color="var(--t3)";}}
        >💬</button>
      </div>
      <div style={{width:"100%",maxWidth:720}}>
        <div style={{textAlign:"center",marginBottom:sel?20:32}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:4,textTransform:"uppercase",color:"var(--accent-dim)",marginBottom:10}}>MemorizeX</div>
          {!sel&&<h1 style={{fontFamily:"'Playfair Display',serif",fontSize:34,fontWeight:700,margin:"0 0 6px",textWrap:"balance"}}>Hey, {userName}</h1>}
          {!sel&&<p style={{fontSize:14,color:"var(--t5)",fontWeight:300,marginBottom:4}}>{SCRIPTS.length+customScripts.length} scripts · Pick one, choose your role, practice</p>}
          {!sel&&<div style={{display:"flex",gap:12,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}}>
            <StreakBadge userName={userName}/>
            <button onClick={handleLogout} style={{padding:"4px 14px",background:"transparent",border:"none",color:"var(--t7)",fontSize:12,cursor:"pointer",textDecoration:"underline",textUnderlineOffset:3}}>Not {userName}?</button>
            <button onClick={()=>setShowThemes(true)} style={{padding:"4px 12px",background:"var(--bg3)",border:"1px solid var(--brd3)",borderRadius:20,color:"var(--t3)",fontSize:12,cursor:"pointer",transition:"all 0.2s"}}
              onMouseOver={e=>{e.currentTarget.style.borderColor="var(--accent)";e.currentTarget.style.color="var(--accent)"}}
              onMouseOut={e=>{e.currentTarget.style.borderColor="var(--brd3)";e.currentTarget.style.color="var(--t3)"}}>
              🎨 Themes
            </button>
            <button onClick={()=>setShowChangelog(true)} style={{padding:"4px 12px",background:"var(--accent-bg)",border:"1px solid var(--accent-border)",borderRadius:20,color:"var(--accent-bright)",fontSize:11,fontWeight:700,letterSpacing:0.5,cursor:"pointer",transition:"all 0.2s"}}
              onMouseOver={e=>{e.currentTarget.style.background="var(--accent-bg3)";e.currentTarget.style.color="var(--accent)";}}
              onMouseOut={e=>{e.currentTarget.style.background="var(--accent-bg)";e.currentTarget.style.color="var(--accent-bright)";}}>
              ✦ What's New
            </button>
          </div>}
        </div>
        {sel?<Memorizer script={sel} onBack={()=>setSel(null)} userName={userName} onSessionComplete={handleSessionComplete}/>:<>{!sel&&<PracticeHistory userName={userName}/>}<Landing onSelect={setSel} onAddScript={()=>setShowCreator(true)} customScripts={customScripts}/></>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
